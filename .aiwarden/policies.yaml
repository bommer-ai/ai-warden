policies:

  - name: pii-protection
    type: pii
    enabled: true

  - name: tool-safety
    type: tools
    enabled: true
    builtin:
      filesystem-safety: true
      no-privilege-escalation: true
    rules:
      - name: no-write-home
        action: refusal
        message: "Writing to /Users/anoop.bansal is not allowed."
        match:
          tool: "*writ*"
          any_arg:
            startswith: "/Users/anoop.bansal"

      - name: no-delete-home
        action: refusal
        message: "Deleting files under /Users/anoop.bansal is not allowed."
        match:
          tool: "*delet*"
          any_arg:
            startswith: "/Users/anoop.bansal"

      - name: no-shell-rm-rf
        action: refusal
        message: "Recursive deletion via shell is not allowed."
        match:
          tool: run_shell
          command:
            regex: "rm\\s+.*-[rRfF]*[rR]"

  - name: budget-control
    type: budget
    enabled: true
    group_by: metadata.team
    limits:
      engineering: 10.00
      default: 1.00
    reset: monthly
