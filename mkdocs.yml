site_name: ai-warden
site_description: Governance middleware for LLM agents. Budget control, PII protection, tool safety — one import, zero code changes.
site_url: https://ai-warden.dev

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - search.highlight
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/anthropics/ai-warden
repo_name: ai-warden

nav:
  - Home: index.md
  - Getting Started:
    - Install: getting-started/install.md
    - Quickstart: getting-started/quickstart.md
    - Concepts: getting-started/concepts.md
  - Guides:
    - PII Redaction: guides/pii.md
    - Budget Control: guides/budget.md
    - Tool Safety: guides/tools.md
    - Custom Policies: guides/custom-policies.md
    - Multi-Agent: guides/multi-agent.md
  - Reference:
    - Configuration: reference/configuration.md
    - Python API: reference/python-api.md
    - Event Schema: reference/events.md
    - Policy Types: reference/policy-types.md
  - Architecture: architecture.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
